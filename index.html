<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Greater Hartford Threshold Choir </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  .top-stripe{position:fixed;top:0;left:0;right:0;height:6px;background:var(--purple);z-index:100}
  :root{--bg:#FAFAF8;--bg-deep:#F0EEE8;--bg-card:#FFFFFF;--paper:#FFFFFF;--ink:#1F1A24;--ink-soft:#3D3744;--ink-muted:#7A7382;--purple:#6C3FA0;--purple-deep:#4E2880;--purple-light:#9573C2;--purple-mist:#E5DAF0;--green:#9EA374;--green-deep:#6E7350;--green-mist:#DDDFC8;--gold:#B59148;--rule:#E4DFEC;--rule-soft:#EFEBF4;--shadow:0 1px 2px rgba(31,26,36,.04),0 12px 32px rgba(108,63,160,.08)}
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:'EB Garamond',Garamond,'Adobe Garamond Pro',Georgia,serif;background:var(--bg);color:var(--ink);font-size:18px;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5,.display{font-family:'EB Garamond',Garamond,'Adobe Garamond Pro',Georgia,serif;font-weight:500;line-height:1.08;letter-spacing:-0.005em;color:var(--purple);margin:0}
  h1{font-size:clamp(44px,7vw,82px);font-weight:500;letter-spacing:-0.012em;line-height:1.04}
  h2{font-size:clamp(32px,4.6vw,52px);font-weight:500;letter-spacing:-0.008em}
  h3{font-size:clamp(22px,2.4vw,30px);font-weight:500;color:var(--ink)}
  p{margin:0 0 1em}
  a{color:var(--purple);text-decoration:none;border-bottom:1px solid rgba(126,12,110,.3);transition:border-color .2s,color .2s}
  a:hover{color:var(--purple-deep);border-color:var(--purple-deep)}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.06em;text-transform:uppercase}
  .eyebrow{font-family:'Verdana','Geneva',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.26em;text-transform:uppercase;color:var(--purple);display:inline-flex;align-items:center;gap:12px}
  .eyebrow::before{content:"";width:28px;height:1px;background:var(--purple)}
  .container{max-width:1240px;margin:0 auto;padding:0 32px}
  .container-narrow{max-width:880px;margin:0 auto;padding:0 32px}
  @media(max-width:640px){.container,.container-narrow{padding:0 22px}}
  .nav{position:sticky;top:6px;z-index:50;margin-top:6px;background:#FFFFFC;backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);border-bottom:1px solid #E8E2EE}
  .nav-inner{display:grid;grid-template-columns:auto 1fr;align-items:center;height:88px;gap:24px}
  .nav .brand{justify-self:start}
  .nav .nav-links{justify-self:end;display:flex;gap:8px;align-items:center}
  @media(max-width:600px){.nav-inner{grid-template-columns:auto 1fr auto;height:64px;padding:0;gap:0;align-items:center}.menu-btn{display:flex !important;align-items:center;justify-content:center;width:44px;height:44px;color:var(--ink);justify-self:end;flex-shrink:0;margin-right:32px}.nav .nav-links{display:none;position:absolute;top:100%;left:0;right:0;z-index:200;background:#FFFFFC;border-bottom:1px solid #E8E2EE;flex-direction:column;gap:0;padding:8px 0;box-shadow:0 4px 16px rgba(0,0,0,.07)}.nav .nav-links.open{display:flex}.nav-link{padding:16px 22px;font-size:13px;letter-spacing:0.1em;width:100%;text-align:left;border-radius:0}}
  .brand{display:flex;align-items:center;gap:14px;border:none}
  .brand:hover{border:none}
  .brand img{display:block}
  .brand-name{font-family:'EB Garamond',Garamond,serif;font-style:italic;font-size:24px;font-weight:500;color:var(--purple);letter-spacing:0.005em;line-height:1}
  .nav-links{display:flex;gap:4px;align-items:center}
  .nav-link{padding:10px 22px;font-size:12px;font-weight:700;white-space:nowrap;font-family:'Verdana','Geneva',sans-serif;text-transform:uppercase;color:var(--ink-soft);border:none;border-radius:0;letter-spacing:0.14em;position:relative;transition:color .2s}
  .nav-link:hover{color:var(--ink);border:none;background:transparent}
  .nav-link.active{color:var(--ink)}
  .nav-link.active::after{content:"";position:absolute;left:22px;right:22px;bottom:8px;height:1px;background:var(--ink)}
  .menu-btn{display:none}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:14px 24px;font-size:14px;font-weight:600;letter-spacing:0.04em;border-radius:999px;border:1px solid transparent;cursor:pointer;transition:all .2s;text-transform:uppercase;line-height:1}
  .btn-primary{background:var(--purple);color:var(--paper)}
  .btn-primary:hover{background:var(--purple-deep);transform:translateY(-1px)}
  a.btn{border-bottom:none}
  .btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 30px;font-family:'Verdana',sans-serif;font-size:13px;font-weight:700;letter-spacing:0.08em;border:1.5px solid var(--purple);color:var(--purple);background:transparent;border-radius:3px;transition:all .2s;cursor:pointer;text-decoration:none}
  .btn-outline:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
  a.btn-outline{border-bottom:1.5px solid var(--purple)}
  a.btn-outline:hover{border-color:var(--purple)}
  section{padding:96px 0}
  @media(max-width:640px){section{padding:64px 0}}
  .purple-band{background:var(--purple);color:#fff;padding:38px 0 44px;text-align:center}
  .purple-band .band-title{font-family:'EB Garamond',Garamond,serif;font-size:clamp(28px,3.6vw,40px);font-weight:500;color:#fff;letter-spacing:0;margin:0 0 10px}
  .purple-band .band-sub{font-family:'EB Garamond',Garamond,serif;font-style:italic;font-size:clamp(16px,1.6vw,19px);color:#E5DAF0;max-width:700px;margin:0 auto;line-height:1.5}
  .home-main-inner{display:grid;grid-template-columns:1.05fr 1fr;gap:48px;align-items:start;padding-top:48px;padding-bottom:64px}
  .home-h1{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(36px,4.4vw,56px);color:var(--purple);margin:0 0 16px;line-height:1.02}
  .home-h2{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(22px,2.4vw,32px);color:var(--purple);margin:0 0 12px;line-height:1.05}
  .home-lede{font-size:clamp(15px,1.35vw,19px);line-height:1.6;color:var(--ink-soft);margin:0;max-width:560px}
  .home-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:28px}
  .home-btns .btn-outline{padding:9px 18px;font-size:11px}
  .home-photo{aspect-ratio:3/4;border-radius:6px;overflow:hidden;position:sticky;top:24px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 32px rgba(76,40,128,.10)}
  .home-photo img{width:100%;height:100%;object-fit:cover;display:block}
  @media(max-width:900px){.home-main-inner{grid-template-columns:1fr;gap:0;padding-top:0;padding-bottom:32px}.home-photo{order:-1;max-height:none;height:56vw;min-height:200px;border-radius:0;margin:0 -22px 28px;width:calc(100% + 44px)}}
  .article-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:14px}
  .article-list a{font-family:'EB Garamond',Garamond,serif;font-size:19px;color:var(--purple);border-bottom:1px solid var(--purple);padding-bottom:3px;text-decoration:none;display:inline;transition:color .2s}
  .article-list .meta{font-style:italic;color:var(--ink-muted);font-size:15px}
  .lavender-band{background:#B8A4DC;padding:60px 0}
  .quote-card-wix{background:#B8A4DC;border-radius:6px;padding:56px 64px;margin:0 auto 32px;max-width:760px;box-shadow:0 1px 2px rgba(0,0,0,.03),0 4px 16px rgba(76,40,128,.08)}
  .quote-card-wix .qtext{font-family:'EB Garamond',Garamond,serif;font-style:italic;font-size:26px;line-height:1.6;color:#fff;margin:0 0 24px}
  .quote-card-wix .qattr{font-family:'Verdana',sans-serif;font-size:11px;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--purple);text-align:right}
  .testimonials-head{text-align:center;padding:40px 0 32px}
  .voices{font-family:'EB Garamond',Garamond,serif;font-size:clamp(36px,4.4vw,56px);font-weight:500;color:var(--purple);line-height:1.02;margin:0 0 16px}
  .voices-sub{font-family:'EB Garamond',Garamond,serif;font-style:italic;color:var(--ink-muted);font-size:clamp(18px,1.8vw,24px);margin:0}
  .testimonials-split{display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center}
  .testimonials-img{aspect-ratio:3/4;overflow:hidden;border-radius:6px;position:relative}
  .testimonials-img img{width:100%;height:100%;object-fit:cover;display:block;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px rgba(76,40,128,.18)}
  .carousel-wrap{max-width:760px;margin:0 auto;width:100%}
  .carousel-card{min-height:160px;transition:opacity 0.35s ease}
  .carousel-dots{display:flex;gap:10px;justify-content:center;margin-top:24px;padding:4px 0}
  .carousel-dot{width:10px;height:10px;border-radius:50%;border:none;background:rgba(255,255,255,0.35);cursor:pointer;padding:0;transition:background .25s,transform .25s}
  .carousel-dot.active{background:#fff;transform:scale(1.2)}
  @media(max-width:780px){.testimonials-split{grid-template-columns:1fr;gap:32px}.testimonials-img{aspect-ratio:16/9}}
  .join-intro-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:64px;align-items:start}
  @media(max-width:820px){.join-intro-grid{grid-template-columns:1fr;gap:32px}}
  .join-eyebrow{font-family:'EB Garamond',Garamond,serif;font-size:clamp(36px,4.4vw,56px);font-weight:500;letter-spacing:0;text-transform:none;color:var(--purple);line-height:1.02;margin:0 0 24px}
  .join-lede{font-size:clamp(18px,1.8vw,24px);line-height:1.6;color:var(--ink-soft);margin:0}
  .join-commit-sub{color:var(--purple);font-size:clamp(18px,1.8vw,24px);line-height:1.6;margin:0 0 32px;font-family:'EB Garamond',Garamond,serif}
  .join-commit-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:22px}
  .join-commit-list li{position:relative;padding-left:26px;font-family:'EB Garamond',Garamond,serif;font-size:clamp(18px,1.8vw,24px);line-height:1.6;color:var(--ink)}
  .join-commit-list li::before{content:"";position:absolute;left:0;top:8px;width:8px;height:8px;background:var(--purple)}
  .join-lavender-section{background:#C5B4DE;padding:96px 0}
  .join-steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  @media(max-width:820px){.join-steps-grid{grid-template-columns:1fr;gap:32px}}
  .join-steps-title{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(40px,5vw,60px);color:var(--purple);margin:0 0 16px;line-height:1.04}
  .join-steps-sub{font-family:'EB Garamond',Garamond,serif;color:var(--ink-soft);font-size:clamp(18px,1.8vw,24px);line-height:1.6;margin:0 0 40px}
  .join-steps-list{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:32px}
  .join-steps-list li{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:start}
  .step-n{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:28px;color:var(--purple);line-height:1;min-width:22px}
  .step-body p{font-family:'EB Garamond',Garamond,serif;color:var(--ink);font-size:clamp(18px,1.8vw,24px);line-height:1.6;margin:0}
  .step-cta{display:inline-block;margin-top:14px;padding:11px 26px;background:var(--purple);color:#fff;font-family:'Verdana','Geneva',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.06em;text-decoration:none;border:none;border-bottom:none;border-radius:3px;transition:background .2s}
  .step-cta:hover{background:var(--purple-deep);color:#fff;border-color:transparent}
  .ras-head{text-align:center;padding:88px 0 0}
  .ras-head h1{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(36px,4.4vw,56px);letter-spacing:0;text-transform:none;color:var(--purple);margin:0 0 4px;line-height:1.02}
  .ras-sub{font-family:'EB Garamond',Garamond,serif;font-style:italic;color:var(--ink-muted);font-size:clamp(14px,1.4vw,17px);max-width:640px;margin:0 auto;line-height:1.5}
  .ras-intro-grid{display:grid;grid-template-columns:1fr 1.05fr;gap:48px;align-items:start;padding:48px 0}
  @media(max-width:820px){.ras-intro-grid{grid-template-columns:1fr;gap:32px}}
  .ras-intro-grid h2{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(28px,3.4vw,44px);color:var(--purple);margin:0 0 24px;line-height:1.05}
  .ras-intro-grid p{font-size:clamp(15px,1.35vw,19px);line-height:1.6;color:var(--ink-soft);margin:0 0 16px}
  .ras-chapter-list{list-style:disc;padding-left:24px;margin:8px 0 0}
  .ras-chapter-list li{font-size:clamp(15px,1.35vw,19px);line-height:1.7;color:var(--ink-soft)}
  .ras-form-section{padding:24px 0 96px}
  .ras-form-title{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(28px,3.4vw,44px);color:var(--purple);margin:0 0 8px}
  .ras-form .field label{font-family:'Verdana','Geneva',sans-serif;font-size:13px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin-bottom:6px}
  .ras-form .field input,.ras-form .field textarea,.ras-form .field select{background:#fff;border:1px solid #C9C2D4;border-radius:3px;padding:12px 14px}
  .ras-toggle-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .ras-toggle-btn{padding:18px 12px;background:#fff;border:1px solid #C9C2D4;border-radius:3px;font-family:'EB Garamond',Garamond,serif;font-size:17px;color:var(--ink-soft);cursor:pointer;transition:all .15s;text-align:center}
  .ras-toggle-btn:hover{border-color:var(--purple)}
  .ras-toggle-btn.selected{background:var(--purple-mist);border:2px solid var(--purple);color:var(--purple-deep);font-weight:500}
  .ras-radio-row{display:flex;gap:32px;padding:6px 0}
  .ras-radio-row label{display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-family:'EB Garamond',Garamond,serif;font-size:16px;color:var(--ink-soft);font-weight:400;letter-spacing:0;text-transform:none}
  .ras-radio-row input[type=radio]{width:18px;height:18px;accent-color:var(--purple);margin:0;flex-shrink:0}
  .ras-submit{width:100%;padding:18px;background:var(--purple);color:#fff;border:none;border-radius:3px;cursor:pointer;font-family:'Verdana','Geneva',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.06em;transition:background .2s;margin-top:8px}
  .ras-submit:hover{background:var(--purple-deep)}
  .ras-req{color:var(--purple);margin-left:3px}
  .field{display:flex;flex-direction:column;gap:8px;margin-bottom:22px}
  .field label{font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-muted);font-weight:600}
  .field input,.field textarea,.field select{font-family:'EB Garamond',Garamond,serif;font-size:16px;color:var(--ink);background:var(--bg-card);border:1px solid var(--rule);border-radius:4px;padding:14px 16px;transition:border-color .2s,background .2s;outline:none}
  .field input:focus,.field textarea:focus{border-color:var(--purple);background:var(--paper);box-shadow:0 0 0 3px var(--purple-mist)}
  .field textarea{resize:vertical;min-height:120px;font-family:inherit}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
  @media(max-width:640px){.form-row{grid-template-columns:1fr}}
  .form-success{padding:48px;text-align:center;background:var(--bg-card);border:1px solid var(--green);border-radius:8px}
  .form-success .check-icon{width:56px;height:56px;border-radius:50%;background:var(--green-deep);color:var(--paper);display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
  .gate{min-height:calc(100vh - 88px);display:flex;align-items:center;justify-content:center;padding:48px 24px;background:linear-gradient(180deg,var(--bg) 0%,var(--bg-deep) 100%)}
  .gate-card{background:var(--paper);border:1px solid var(--rule);border-radius:8px;padding:56px 48px;max-width:460px;width:100%;box-shadow:var(--shadow);text-align:center}
  .donate-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start}
  @media(max-width:820px){.donate-grid{grid-template-columns:1fr;gap:32px}}
  .donate-photo{aspect-ratio:4/5;border-radius:6px;overflow:hidden}
  .inq-section{margin-top:48px}
  .inq-section h2{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(22px,2.4vw,28px);color:var(--ink);margin:0 0 24px}
  .inq-form .field label{font-family:'Verdana','Geneva',sans-serif;font-size:13px;font-weight:400;letter-spacing:0;text-transform:none;color:var(--ink-soft);margin-bottom:6px}
  .inq-form .field input,.inq-form .field textarea,.inq-form .field select{background:#fff;border:1px solid #C9C2D4;border-radius:3px;padding:12px 14px}
  .inq-radio-group{display:flex;flex-direction:column;gap:8px;padding:6px 0}
  .inq-radio-group label{display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-family:'EB Garamond',Garamond,serif;font-size:15px;color:var(--ink-soft);font-weight:400;letter-spacing:0;text-transform:none;padding:0}
  .inq-radio-group input[type=radio]{width:16px;height:16px;accent-color:var(--purple);margin:0;flex-shrink:0}
  .inq-q{margin-bottom:18px}
  .inq-q-label{font-family:'Verdana','Geneva',sans-serif;font-size:13px;color:var(--ink-soft);margin-bottom:4px;display:block}
  .inq-context{background:#f2f0f5;border-radius:4px;padding:16px 20px;margin-bottom:24px}
  .inq-context p{font-family:'Verdana','Geneva',sans-serif;font-size:13px;color:var(--ink-soft);margin:0;line-height:1.6}
  .members-bar{background:var(--purple-deep);color:var(--paper);border-bottom:1px solid rgba(255,255,255,.1)}
  .mh-section{position:relative}
  .mh-h2{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(40px,5vw,64px);color:var(--ink);line-height:1.04;margin:0 0 24px}
  .mh-h2-centered{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(36px,4.6vw,56px);color:var(--ink);line-height:1.04;margin:0 0 24px}
  .mh-h2-white{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:clamp(40px,5vw,64px);color:#fff;line-height:1.04;margin:0 0 40px}
  .mh-body{font-family:'EB Garamond',Garamond,serif;color:var(--ink-soft);font-size:16px;line-height:1.55;margin:0 0 24px;max-width:540px}
  .mh-grid{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
  @media(max-width:820px){.mh-grid{grid-template-columns:1fr}}
  .mh-purple-band{height:180px;background:var(--purple)}
  .mh-dark-card{background:#3D3744;color:#fff;padding:48px 32px;border-radius:6px;display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:16px}
  .mh-dark-card p{font-family:'EB Garamond',Garamond,serif;font-size:16px;color:#E5E0EC}
  .mh-white-btn{color:#fff !important;border-color:#fff !important;background:transparent}
  .mh-white-btn:hover{background:#fff !important;color:var(--purple) !important}
  .mh-purple-section{background:var(--purple);color:#fff;padding:96px 0}
  .mh-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
  @media(max-width:820px){.mh-card-grid{grid-template-columns:1fr}}
  .mh-card{background:#fff;border-radius:6px;padding:36px 32px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 12px 32px rgba(0,0,0,.10)}
  .mh-card h3{font-family:'EB Garamond',Garamond,serif;font-weight:500;font-size:26px;color:var(--ink);margin:0 0 14px}
  .mh-card p{font-family:'EB Garamond',Garamond,serif;color:var(--ink-soft);font-size:15px;line-height:1.55;margin:0 0 24px}
  .fade-in{animation:fadeIn .5s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  footer{background:#EBE2F3;color:var(--ink-soft);padding:0;margin-top:0;border-top:1px solid var(--purple-light)}
  .skip{position:absolute;left:-9999px;top:0}
  .skip:focus{left:16px;top:16px;background:var(--purple);color:var(--paper);padding:8px 14px;border-radius:4px;z-index:99}

  /* ── Privacy Policy & Terms of Service pages ── */

const useRoute = () => {
  const get = () => { const h=(window.location.hash||"#/").replace(/^#/,""); return h.startsWith("/")?h:"/"+h; };

  useEffect(()=>{
    const onHash=()=>{setRoute(get());window.scrollTo({top:0,behavior:"instant" in window?"instant":"auto"});};
    window.addEventListener("hashchange",onHash);
    return ()=>window.removeEventListener("hashchange",onHash);
  },[]);
  return route;
};

  useEffect(()=>{if(paused)return;const t=setInterval(()=>{goTo((idx+1)%cards.length);},90000);return()=>clearInterval(t);},[idx,paused]);
  const c=cards[idx];
  return (
    <div className="carousel-wrap" onMouseEnter={()=>setPaused(true)} onMouseLeave={()=>setPaused(false)}>
      <article className="quote-card-wix carousel-card" style={{opacity:fading?0:1}}>

      <div className="carousel-dots">
        {cards.map((_,i)=>(
          <button key={i} className={`carousel-dot${i===idx?" active":""}`} onClick={()=>goTo(i)} aria-label={`Quote ${i+1}`}/>

      </div>
    </div>
  );
};

const RequestSing = () => {
  const [form,setForm]=useState({requestorName:"",phone:"",email:"",patientName:"",setting:"",relationship:"",knowAbout:"",whoPresent:"",hospice:"",heardAbout:"",heardAboutOther:""});
  const [submitted,setSubmitted]=useState(false);
  const [errors,setErrors]=useState({});
  const [sending,setSending]=useState(false);
  const [sendError,setSendError]=useState("");
  const submit=async(e)=>{
    e.preventDefault();
    const errs={};
    if(!form.requestorName.trim())errs.requestorName="Required";
    if(!form.phone.trim())errs.phone="Required";
    if(!form.email.trim())errs.email="Required";
    else if(!/^\S+@\S+\.\S+$/.test(form.email))errs.email="Please use a valid email";
    if(!form.patientName.trim())errs.patientName="Required";
    if(!form.setting)errs.setting="Please choose one";
    if(!form.relationship.trim())errs.relationship="Required";
    if(!form.knowAbout.trim())errs.knowAbout="Required";
    if(!form.hospice)errs.hospice="Please choose";
    setErrors(errs);
    if(Object.keys(errs).length>0)return;
    setSending(true);setSendError("");
    const fd=new FormData();
    const labels={requestorName:"Requestor Name",phone:"Phone",email:"Email",patientName:"Patient Name",setting:"Facility or Private Home",relationship:"Relationship to person requesting sing:",knowAbout:"What would you like us to know about the patient?",whoPresent:"Who will be present at the sing",hospice:"Patient on hospice",heardAbout:"How did you hear about Threshold Choir?",heardAboutOther:"How did you hear (other)"};
    for(const[k,label]of Object.entries(labels)){const v=form[k];if(v!==undefined&&v!=="")fd.append(label,v);}
    fd.append("_subject",`Bedside Sing Request \u2014 ${form.patientName||"new request"}`);
    fd.append("_replyto",form.email||"");
    fd.append("_cc","8603058127@vtext.com,6177971632@vtext.com");
    fd.append("_template","table");
    fd.append("_captcha","false");
    try{
      const res=await fetch("https://formsubmit.co/ajax/thresholdchoirhartford@gmail.com",{method:"POST",headers:{"Accept":"application/json"},body:fd});
      if(res.ok){
        const zapierData=new FormData();
        for(const[k,v]of Object.entries(form))zapierData.append(k,v||"");
        zapierData.append("message",`New Sing Request: ${form.patientName} — ${form.setting}. Contact: ${form.requestorName} at ${form.phone}.`);
        fetch("https://hooks.zapier.com/hooks/catch/27783461/4bdo30u/",{method:"POST",body:zapierData}).catch(()=>{});
        setSubmitted(true);
      }else{throw new Error("Server returned "+res.status);}
    }catch(err){setSendError("We couldn't send your request just now. Please email us at thresholdchoirhartford@gmail.com or try again in a moment.");}
    finally{setSending(false);}
  };
  const Req=()=><span className="ras-req">*</span>;
  return (
    <main id="main" className="fade-in">
      <header className="ras-head"><div className="container"><h1>Request a Sing</h1><p className="ras-sub" style={{fontStyle:"normal",marginTop:12}}>This is a sacred time. We are grateful you reached out.</p></div></header>
      <section style={{paddingTop:0,paddingBottom:32}}>
        <div className="container">
          <div className="ras-intro-grid">
            <div><img src="/assets/chair-with-flowers.jpg" alt="A quiet room ready for a visit" style={{width:"100%",height:"100%",objectFit:"cover",display:"block",borderRadius:6}}/></div>
            <div>
              <h2>Inviting Kindness to the Bedside</h2>
              <p>We would be honored to sing at the bedside of your loved one.</p>
              <p>When you're ready, please share a few details in the form below. One of our coordinators will respond within 24 hours. If you have an urgent need, text Betsy (<a href="sms:8603058127" style={{color:"var(--purple)"}}>860-305-8127</a>) and Betty (<a href="sms:6177971632" style={{color:"var(--purple)"}}>617-797-1632</a>) directly.</p>
              <p>We currently serve: <strong style={{color:"var(--ink)",fontWeight:500}}>Avon, Bloomfield, Canton, Farmington, Granby, Hartford, Simsbury, South Windsor, West Hartford, and Windsor</strong>.</p>
              <ul className="ras-chapter-list">
                <li><a href="https://thresholdchoir.org/westernct/" target="_blank" rel="noopener noreferrer">Threshold Singers of Western CT</a> (Brookfield, CT)</li>
                <li><a href="mailto:middletown@thresholdchoir.org">Middlesex Threshold Singers</a> (Middletown, CT)</li>
                <li><a href="mailto:Nutmeg@thresholdchoir.org">Nutmeg Threshold Singers</a> (Woodbury, CT)</li>
              </ul>
            </div>
          </div>
        </div>
      </section>
      <section className="ras-form-section">
        <div className="container-narrow">
          <h2 className="ras-form-title">Bedside Singing Request</h2>
          {submitted?(
            <div className="form-success fade-in">
              <div className="check-icon">{Icons.check}</div>
              <h3 style={{marginBottom:10}}>Request received.</h3>
              <p className="text-soft" style={{margin:"0 auto",maxWidth:480}}>A coordinator will reach out within a day. If your need is urgent, please email <a href="mailto:thresholdchoirhartford@gmail.com">thresholdchoirhartford@gmail.com</a> directly.</p>
            </div>
          ):(
            <form className="ras-form" onSubmit={submit} noValidate>
              <div className="form-row">
                <div className="field"><label htmlFor="rname">Requestor Name <Req/></label><input id="rname" type="text" value={form.requestorName} onChange={e=>setForm({...form,requestorName:e.target.value})}/>{errors.requestorName&&<span style={{color:"#A03A38",fontSize:13}}>{errors.requestorName}</span>}</div>

const PasswordGate=({onUnlock})=>{
  const [pw,setPw]=useState("");const [err,setErr]=useState("");const inputRef=useRef(null);
  useEffect(()=>{inputRef.current&&inputRef.current.focus();},[]);
  const submit=(e)=>{e.preventDefault();if(pw===MEMBERS_PASSWORD){sessionStorage.setItem("ghtc-member","1");onUnlock();}else{setErr("That password doesn't match. Please try again or contact your chapter leader.");}};
  return(
    <div className="gate fade-in">
      <div className="gate-card">
        <Mark size={72}/>
        <h2 style={{marginBottom:12,fontFamily:"'EB Garamond',Garamond,serif",fontSize:"clamp(36px,4.4vw,56px)",fontWeight:500,color:"var(--purple)",letterSpacing:0,lineHeight:1.02}}>Members Hub</h2>
        <p style={{margin:"0 0 32px",color:"var(--ink-soft)"}}>For current Greater Hartford Threshold Choir members only.</p>
        <form onSubmit={submit}>
          <input ref={inputRef} type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Enter password" style={{width:"100%",padding:"14px 16px",fontSize:16,border:"1px solid var(--rule)",borderRadius:4,background:"var(--bg-card)",fontFamily:"inherit",color:"var(--ink)",outline:"none",marginBottom:12}}/>
          <button type="submit" className="btn btn-primary" style={{width:"100%",justifyContent:"center",padding:"15px",display:"flex"}}>Enter</button>
          {err&&<div style={{color:"#A03A38",fontSize:14,marginTop:10}}>{err}</div>}
        </form>
      </div>
    </div>
  );
};

const MembersDashboard=({onLogout})=>{
  const [singForm,setSingForm]=useState({date:"",location:"",singers:"",notes:""});
  const [singSubmitted,setSingSubmitted]=useState(false);
  const [singSending,setSingSending]=useState(false);
  const submitSing=async(e)=>{
    e.preventDefault();if(!singForm.date||!singForm.location.trim())return;setSingSending(true);
    const fd=new FormData();fd.append("Date of Sing",singForm.date);fd.append("Location",singForm.location);if(singForm.singers.trim())fd.append("Singers Present",singForm.singers);if(singForm.notes.trim())fd.append("Notes",singForm.notes);fd.append("_subject",`Sing Data Submission — ${singForm.date}`);fd.append("_template","table");fd.append("_captcha","false");
    try{const res=await fetch("https://formsubmit.co/ajax/thresholdchoirhartford@gmail.com",{method:"POST",headers:{"Accept":"application/json"},body:fd});if(res.ok)setSingSubmitted(true);}catch(err){}
    setSingSending(false);
  };
  return(
    <main id="main" className="fade-in">
      <div className="members-bar"><div className="container" style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 0",gap:16}}><div style={{fontSize:11,fontFamily:"'Verdana',sans-serif",fontWeight:700,letterSpacing:"0.26em",textTransform:"uppercase",color:"var(--purple-mist)"}}>Members Hub · Greater Hartford Threshold Choir</div><button style={{color:"#fff",border:"1px solid rgba(255,255,255,.4)",borderRadius:999,padding:"8px 16px",fontSize:13,letterSpacing:"0.06em",fontFamily:"'Verdana',sans-serif",fontWeight:700}} onClick={onLogout}>Sign out</button></div></div>
      <section className="mh-section" style={{paddingTop:80,paddingBottom:80}}><div className="container"><div className="mh-grid"><div><h2 className="mh-h2">Members Roster</h2><p className="mh-body">Access the internal directory for communication and community networking.</p><a href="#" onClick={(e)=>e.preventDefault()} className="btn-outline" style={{marginTop:8}}>View Roster Document</a></div></div></div></section>
      <section className="mh-section" style={{padding:"64px 0",background:"var(--bg-deep)"}}>
        <div className="container-narrow">
          <h2 className="mh-h2">Sing Data Submission</h2>
          <p className="mh-body" style={{marginBottom:32}}>Record your singing dates and locations here.</p>
          {singSubmitted?(
            <div className="form-success fade-in"><div className="check-icon">{Icons.check}</div><h3 style={{marginBottom:10}}>Submission recorded.</h3><button className="btn-outline" style={{marginTop:24}} onClick={()=>{setSingSubmitted(false);setSingForm({date:"",location:"",singers:"",notes:""});}}>Submit another</button></div>
          ):(
            <form className="ras-form" onSubmit={submitSing} noValidate>
              <div className="form-row">
                <div className="field"><label htmlFor="sdate">Date of Sing <span className="ras-req">*</span></label><input id="sdate" type="date" value={singForm.date} onChange={e=>setSingForm({...singForm,date:e.target.value})}/></div>
                <div className="field"><label htmlFor="sloc">Location <span className="ras-req">*</span></label><input id="sloc" type="text" placeholder="e.g. McLean Home / private residence in Simsbury" value={singForm.location} onChange={e=>setSingForm({...singForm,location:e.target.value})}/></div>
              </div>
              <div className="field"><label htmlFor="ssingers">Singers Present</label><input id="ssingers" type="text" value={singForm.singers} onChange={e=>setSingForm({...singForm,singers:e.target.value})}/></div>
              <div className="field"><label htmlFor="snotes">Notes</label><textarea id="snotes" rows={4} value={singForm.notes} onChange={e=>setSingForm({...singForm,notes:e.target.value})}/></div>
              <button type="submit" className="ras-submit" disabled={singSending}>{singSending?"Sending…":"Submit Sing Data"}</button>
            </form>
          )}
        </div>
      </section>
      <div className="mh-purple-band"></div>
      <section className="mh-section" style={{paddingTop:64,paddingBottom:80}}><div className="container"><h2 className="mh-h2">Practice Calendar</h2><p className="mh-body" style={{marginBottom:40,maxWidth:560}}>Stay updated with our rehearsal and sing schedule.</p><div className="mh-dark-card"><p style={{margin:"0 0 24px",textAlign:"center"}}>The practice and outreach calendar is managed as a shared document for our members.</p><a href="#" onClick={(e)=>e.preventDefault()} className="btn-outline mh-white-btn">View Practice Calendar</a></div></div></section>
      <section className="mh-section mh-purple-section"><div className="container"><h2 className="mh-h2-white">Outreach Resources</h2><div className="mh-card-grid"><div className="mh-card"><h3>Working List</h3><p>Access the current working list to coordinate client connections and manage outreach efforts effectively.</p><a href="#" onClick={(e)=>e.preventDefault()} className="btn-outline">Access List</a></div><div className="mh-card"><h3>Scripts</h3><p>Review prepared scripts for consistent and compassionate communication with families and hospice care facilities.</p><a href="#" onClick={(e)=>e.preventDefault()} className="btn-outline">View Scripts</a></div></div></div></section>
      <section className="mh-section" style={{padding:"96px 0",textAlign:"center"}}><div className="container-narrow"><h2 className="mh-h2-centered">Planning<br/>Committee</h2><p className="mh-body" style={{maxWidth:520,margin:"0 auto 32px"}}>Materials and updates for committee members facilitating our mission and coordination.</p><a href="#" onClick={(e)=>e.preventDefault()} className="btn-outline">Planning Committee Materials</a></div></section>
    </main>
  );
};

const Members=()=>{
  const [authed,setAuthed]=useState(()=>sessionStorage.getItem("ghtc-member")==="1");

const App=()=>{
  const route=useRoute();
  let Page;
  if(route==="/"||route==="")Page=Home;
  else if(route==="/testimonials")Page=Testimonials;
  else if(route==="/join")Page=Join;
  else if(route==="/members")Page=Members;
  else if(route==="/request-a-sing")Page=RequestSing;
  else if(route==="/inquire")Page=Inquire;
  else if(route==="/donate")Page=Donate;
  else if(route==="/privacy-policy")Page=PrivacyPolicy;
  else if(route==="/terms-of-service")Page=TermsOfService;
  else Page=Home;
  const showFooter=!(route==="/members"&&sessionStorage.getItem("ghtc-member")!=="1");
  return (
    <>
      <a href="#main" className="skip">Skip to content</a>
      <Nav route={route}/>
      <Page key={route}/>

};
